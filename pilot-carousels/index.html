<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Soulhouse × DRM — Instagram Carousels</title>
  <link rel="stylesheet" href="./carousels.css"/>
  <link rel="stylesheet" href="./lang-toggle.css"/>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="lang-toggle"></div>
  <div id="root"></div>

  <script>
    (function () {
      const q = new URLSearchParams(location.search).get('lang');
      const stored = localStorage.getItem('soulhouse_lang');
      window.__LANG = (q === 'de' || q === 'en') ? q
                    : (stored === 'de' || stored === 'en') ? stored
                    : 'en';
      document.documentElement.lang = window.__LANG;
    })();

    function setLang(next) {
      if (next === window.__LANG) return;
      localStorage.setItem('soulhouse_lang', next);
      const url = new URL(location.href);
      if (next === 'en') url.searchParams.delete('lang');
      else url.searchParams.set('lang', next);
      location.href = url.toString();
    }
    window.setLang = setLang;
  </script>

  <script>
    // Inject ONLY the matching JSX file (loading both causes a top-level
    // `const App` redeclaration SyntaxError and blanks one of the languages).
    (function () {
      const src = window.__LANG === 'de' ? './carousels_de.jsx' : './carousels.jsx';
      document.write('<script type="text/babel" data-presets="react" src="' + src + '"><\/script>');
    })();
  </script>

  <script>
    (function () {
      const mount = document.getElementById('lang-toggle');
      const cur = window.__LANG;
      mount.innerHTML = `
        <div class="lang-pill" role="group" aria-label="Language">
          <button class="lang-seg ${cur === 'en' ? 'is-active' : ''}" data-lang="en">EN</button>
          <button class="lang-seg ${cur === 'de' ? 'is-active' : ''}" data-lang="de">DE</button>
        </div>`;
      mount.addEventListener('click', (e) => {
        const b = e.target.closest('.lang-seg');
        if (b) window.setLang(b.dataset.lang);
      });
    })();
  </script>
</body>
</html>
